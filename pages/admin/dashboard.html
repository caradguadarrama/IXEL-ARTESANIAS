<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — IXEL Artesanías</title>

    <!-- Fuentes del proyecto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap (ya lo usa el proyecto) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Boxicons para iconos de admin -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- CSS del admin -->
    <link rel="stylesheet" href="../../assets/css/admin/dashboard.css">
</head>

<body>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Toast de notificaciones -->
    <div class="admin-toast" id="adminToast"></div>

    <div class="admin-layout">

        <!-- ═══ SIDEBAR ═══ -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-icon">IX</div>
                    <div>
                        <div class="brand-title">IXEL <span>Admin</span></div>
                        <div class="brand-sub">Panel de Administración</div>
                    </div>
                </div>
                <button class="sidebar-close-btn" id="sidebarCloseBtn">
                    <i class='bx bx-x'></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Principal</div>

                <a class="nav-link active" data-view="dashboard">
                    <i class='bx bx-home-alt-2'></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-link" data-view="orders">
                    <i class='bx bx-package'></i>
                    <span>Órdenes de Compra</span>
                    <span class="nav-badge" id="badge-orders">0</span>
                </a>

                <div class="nav-section-label">Catálogo</div>

                <a class="nav-link" data-view="products">
                    <i class='bx bx-grid-alt'></i>
                    <span>Productos</span>
                </a>
                <a class="nav-link" data-view="inventory">
                    <i class='bx bx-cube'></i>
                    <span>Inventario</span>
                </a>
                <a class="nav-link" data-view="categories">
                    <i class='bx bx-tag'></i>
                    <span>Categorías</span>
                </a>

                <div class="nav-section-label">Reportes</div>

                <a class="nav-link" data-view="reports">
                    <i class='bx bx-bar-chart-alt-2'></i>
                    <span>Ventas</span>
                </a>
                <a class="nav-link" data-view="clients">
                    <i class='bx bx-user-circle'></i>
                    <span>Clientes</span>
                </a>

                <div class="nav-section-label">Sistema</div>

                <a class="nav-link" href="../../index.html">
                    <i class='bx bx-store'></i>
                    <span>Ir a la tienda</span>
                </a>
                <a class="nav-link" href="../../pages/auth/login.html">
                    <i class='bx bx-log-out'></i>
                    <span>Cerrar sesión</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user-avatar">AD</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name">Administrador</div>
                    <div class="sidebar-user-role">IXEL Artesanías</div>
                </div>
            </div>
        </aside>

        <!-- ═══ CONTENIDO PRINCIPAL ═══ -->
        <div class="admin-main">

            <!-- Topbar -->
            <header class="admin-topbar">
                <button class="topbar-hamburger" id="hamburgerBtn">
                    <i class='bx bx-menu'></i>
                </button>
                <h1 class="topbar-title" id="topbarTitle">Dashboard</h1>
                <div class="topbar-search">
                    <i class='bx bx-search'></i>
                    <input type="text" placeholder="Buscar productos, órdenes…" id="globalSearchInput">
                </div>
                <div class="topbar-actions">
                    <button class="topbar-icon-btn" title="Notificaciones">
                        <i class='bx bx-bell'></i>
                        <span class="topbar-notif-dot"></span>
                    </button>
                    <button class="topbar-icon-btn" title="Ir a la tienda" onclick="window.location='../../index.html'">
                        <i class='bx bx-store'></i>
                    </button>
                </div>
            </header>

            <!-- Área de contenido (vistas se inyectan aquí) -->
            <div class="admin-content" id="adminContent">
                <!-- El contenido se renderiza dinámicamente por dashboard.js -->
                <div class="loading-screen">
                    <div class="loading-spinner"></div>
                    <p>Cargando panel…</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Modales (se inyectan por JS) -->
    <div id="modal-container"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Módulo principal del admin -->
    <script type="module" src="../../assets/js/admin/dashboard.js"></script>

</body>
</html>
