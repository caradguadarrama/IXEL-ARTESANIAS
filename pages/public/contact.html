<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | IXEL Artesanías</title>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/pages/contact.css">
    
    <!-- JavaScript -->
    <script defer type="module" src="../../assets/js/main.js"></script>
    <script defer type="module" src="../../assets/js/components/pages/contact.js"></script>
</head>

<body>
    <!-- Navbar -->
    <div id="navbar-container"></div>

    <main class="contact">
        
        <!-- HERO SECTION -->
        <section class="contact__hero">
            <div class="contact__hero-container">
                <h1 class="contact__hero-title">Contacto</h1>
            </div>
        </section>

        <!-- INTRODUCCIÓN -->
        <section class="contact__intro">
            <h2 class="contact__intro-title">
                ¿Tienes algo en mente? <br>
                Platícanos tu idea.
            </h2>
            <p class="contact__intro-text">
                Si buscas colores en específico, algo en especial, dudas o sugerencias, escríbenos aquí:
            </p>
        </section>

        <!-- FORMULARIO -->
        <section class="contact__form-section">
            <form class="contact-form" id="contact-form" novalidate>
                
                <div class="contact-form__row">
                    
                    <!-- Columna izquierda -->
                    <div class="contact-form__col">
                        
                        <!-- Campo: Nombre -->
                        <div class="contact-form__field">
                            <label for="name" class="contact-form__label">
                                Nombre <span style="color: #dc3545;">*</span>
                            </label>
                            <input 
                                type="text" 
                                class="contact-form__input" 
                                id="name" 
                                name="name"
                                placeholder="Ej: María González" 
                                required
                                autocomplete="name"
                            >
                            <span class="contact-form__error" data-error="name"></span>
                        </div>

                        <!-- Campo: Teléfono -->
                        <div class="contact-form__field">
                            <label for="phone" class="contact-form__label">
                                Teléfono <span style="color: #dc3545;">*</span>
                            </label>
                            <input 
                                type="tel" 
                                class="contact-form__input" 
                                id="phone" 
                                name="phone"
                                placeholder="Ej: 3312345678" 
                                maxlength="10"
                                required
                                autocomplete="tel"
                            >
                            <span class="contact-form__error" data-error="phone"></span>
                        </div>

                        <!-- Campo: Email -->
                        <div class="contact-form__field">
                            <label for="email" class="contact-form__label">
                                Correo electrónico <span style="color: #dc3545;">*</span>
                            </label>
                            <input 
                                type="email" 
                                class="contact-form__input" 
                                id="email" 
                                name="email"
                                placeholder="Ej: maria@ejemplo.com" 
                                required
                                autocomplete="email"
                            >
                            <span class="contact-form__error" data-error="email"></span>
                        </div>
                        
                    </div>

                    <!-- Columna derecha -->
                    <div class="contact-form__col contact-form__col--message">
                        
                        <!-- Campo: Mensaje -->
                        <div class="contact-form__field contact-form__field--full">
                            <label for="message" class="contact-form__label">
                                Mensaje <span style="color: #dc3545;">*</span>
                            </label>
                            <textarea 
                                class="contact-form__textarea" 
                                id="message" 
                                name="message"
                                placeholder="Escribe tu mensaje aquí..." 
                                required
                            ></textarea>
                            <span class="contact-form__error" data-error="message"></span>
                        </div>

                        <!-- Botón Submit -->
                        <div class="contact-form__submit-wrapper">
                            <button type="submit" class="contact-form__button">
                                Enviar
                            </button>
                        </div>

                        <!-- Mensaje de éxito -->
                        <div class="contact-form__success" id="success-message">
                            <strong>✓ ¡Mensaje enviado exitosamente!</strong><br>
                            Nos pondremos en contacto contigo muy pronto.
                        </div>
                        
                    </div>
                    
                </div>
                
            </form>
        </section>

        <!-- INFORMACIÓN DE CONTACTO -->
        <section class="contact__info">
            <h2 class="contact__info-title">
                Encuéntranos
            </h2>
            
            <div class="contact__info-row">
                
                <!-- Horario -->
                <div class="contact__info-col contact__info-col--schedule">
                    <p class="contact__schedule-text">
                        Encuéntranos cada viernes <br>
                        9:00 AM - 1:00 PM
                    </p>
                    <div class="contact__palmilla">
                        <img 
                            src="../../assets/img/icons/palmilla.png" 
                            alt="Ubicación Palmilla" 
                            class="contact__palmilla-img"
                        >
                    </div>
                </div>

                <!-- Redes sociales -->
                <div class="contact__info-col contact__info-col--social">
                    <div class="contact__social-grid">
                        
                        <!-- Facebook -->

                            target="_blank" 
                            rel="noopener noreferrer" 
                            class="contact__social-link" 
                            aria-label="Facebook"
                        >

                    </div>
                </div>

        </section>

    </main>
