<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login / Registro</title>
    <!--css main y del login-->
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/pages/login.css">

    <script defer type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!--js login-->
    <script defer src="/assets/js/components/pages/login.js"></script>
    <!--main js-->
    <script defer type="module" src="/assets/js/main.js"></script>

</head>

<body>
    <div id="navbar-container"></div>

    <!-- Carrito de compras -->
    <div class="cart">
        <h1>Carrito</h1>
        <ul class="listCart"></ul>
        <div class="checkout">
            <div class="total">
            </div>
            <div class="closeShopping">
                <a>Cerrar</a>
            </div>
        </div>
    </div>


    <main>
        <div class="container login-mode" id="container">
        <div class="image-panel"></div>

        <!-- LOGIN -->
        <div class="form-panel login-panel">
            <h2>¡Nos alegra verte de nuevo!</h2>
            <p>Ingresa a tu cuenta</p>

            <form class="form">
                <div class="input-group">
                    <input name="email" type="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
                    <label>Correo electrónico</label>
                </div>

                <div class="input-group">
                    <input name="password" type="password"pattern="^(?=.*[A-Z])(?=.*[!@#$%^&*]).{7,}$" 
    required 
    title="La contraseña debe tener al menos 7 caracteres, una mayúscula y un carácter especial.">
                    <label>Contraseña</label>
                </div>

                <button type="submit" class="btn">Iniciar Sesión</button>

                <div class="divider">
                    <span>o continúa con</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="social-btn google">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
                        Google
                    </button>
                    <button type="button" class="social-btn apple">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.09l-.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                        </svg> Apple
                    </button>
                </div>

                <p class="toggle-text">
                    ¿No tienes cuenta?
                    <a href="#" onclick="toggleForm(); return false;">Crear cuenta</a>
                </p>
            </form>
        </div>

        <!-- REGISTRO -->
        <div class="form-panel register-panel">
            <h2>¿Eres nuevo? </h2>
            <p>Regístrate gratis</p>

            <form class="form2">
                <div class="input-group">
                     <input name="nombre" type="text" required>
                    <label>Nombre</label>
                </div>

                <div class="input-group">
                    <input name="email" type="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
                    <label>Correo</label>
                </div>

                <div class="input-group">
                    <input name="password" id="password" type="password" pattern="^(?=.*[A-Z])(?=.*[!@#$%^&*]).{7,}$" 
    required 
    title="La contraseña debe tener al menos 7 caracteres, una mayúscula y un carácter especial.">
                    <label>Contraseña</label>
                </div>

                <button type="submit" class="btn">Registrarse</button>

                <div class="divider">
                    <span>o continúa con</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="social-btn google">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
                        Google
                    </button>
                    <button type="button" class="social-btn apple">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.09l-.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                        </svg> Apple
                    </button>
                </div>

                <p class="toggle-text">
                    ¿Ya tienes cuenta?
                    <a href="#" onclick="toggleForm(); return false;">Iniciar sesión</a>
                </p>
            </form>
        </div>
    </div>
    <br>
    <br>
    <div id="footer-container">titulo</div>

    </main>
        
    
</body>
</html>
