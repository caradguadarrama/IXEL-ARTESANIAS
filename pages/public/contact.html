<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contáctanos para crear piezas artesanales únicas de madera parota">
    <title>Contacto | IXEL Artesanías</title>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/pages/contact.css">

    <!-- JavaScript -->
    <script type="module" src="/assets/js/main.js"></script>
    <script type="module" src="/assets/js/components/pages/contact.js"></script>
</head>

<body>
    <!-- Navbar inyectado -->
    <div id="navbar-container"></div>

    <!-- Contenido principal -->
    <main class="contact-page">
        <!-- Hero con título -->
        <section class="contact-hero">
            <div class="contact-hero__overlay">
                <h1 class="contact-hero__title">Contacto</h1>
            </div>
        </section>

        <!-- Introducción -->
        <section class="contact-intro">
            <div class="contact-intro__container">
                <h2 class="contact-intro__title">¿Tienes algo en mente? Pláticanos tu idea.</h2>
                <p class="contact-intro__subtitle">
                    Tenemos la pieza perfecta para ti, si buscas colores en específico, algo en especial, 
                    dudas o sugerencias, escríbenos aquí:
                </p>
            </div>
        </section>

        <!-- Formulario y logo -->
        <section class="contact-content">
            <div class="contact-content__container">
                <!-- Formulario -->
                <div class="contact-content__form-wrapper">
                    <form id="contact-form" class="contact-form" novalidate>
                        <!-- Nombre completo -->
                        <div class="contact-form__field">
                            <label for="name" class="contact-form__label">
                                Nombre completo <span class="contact-form__required">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="name" 
                                name="name"
                                class="contact-form__input" 
                                placeholder="Ej. Juan Pérez"
                                required
                                aria-required="true"
                            >
                            <span class="contact-form__error" data-error="name"></span>
                        </div>

                        <!-- Correo electrónico -->
                        <div class="contact-form__field">
                            <label for="email" class="contact-form__label">
                                Correo electrónico <span class="contact-form__required">*</span>
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email"
                                class="contact-form__input" 
                                placeholder="nombre@ejemplo.com"
                                required
                                aria-required="true"
                            >
                            <span class="contact-form__error" data-error="email"></span>
                        </div>

                        <!-- Mensaje -->
                        <div class="contact-form__field">
                            <label for="message" class="contact-form__label">
                                Mensaje <span class="contact-form__required">*</span>
                            </label>
                            <textarea 
                                id="message" 
                                name="message"
                                class="contact-form__textarea" 
                                rows="5"
                                placeholder="Cuéntanos sobre tu idea..."
                                required
                                aria-required="true"
                            ></textarea>
                            <span class="contact-form__error" data-error="message"></span>
                        </div>

                        <!-- Botón de envío -->
                        <button type="submit" class="contact-form__submit">
                            Enviar Mensaje
                        </button>

                        <!-- Mensaje de éxito -->
                        <div class="contact-form__success" id="success-message" style="display: none;">
                            ✓ ¡Mensaje enviado exitosamente! Te contactaremos pronto.
                        </div>
                    </form>
                </div>

                <!-- Logo decorativo -->
                <div class="contact-content__logo-wrapper">
                    <img 
                        src="/assets/img/icons/Marca-de-agua2.png" 
                        alt="IXEL Artesanías - Logo" 
                        class="contact-content__logo"
                    >
                </div>
            </div>
        </section>
    </main>

    <!-- Footer inyectado -->
    <footer id="footer-container"></footer>
</body>
</html>
