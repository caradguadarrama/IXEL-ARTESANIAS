<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito de Compras — IXEL Artesanías</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  >
  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >
  <!-- Estilos globales del proyecto — ruta absoluta -->
  <link rel="stylesheet" href="/assets/css/main.css">

  <!-- JS: main.js (navbar + footer + badge) y checkout — rutas absolutas -->
  <!-- BUG CORREGIDO: /assets/js/pages/checkout.js → /assets/js/components/pages/checkout.js -->
  <!-- BUG CORREGIDO: ../../assets/... → /assets/... (rutas absolutas) -->
  <!-- products-carrousel.js eliminado: no es módulo y no es necesario en esta página -->
  <script defer type="module" src="/assets/js/main.js"></script>
  <script defer type="module" src="/assets/js/components/pages/checkout.js"></script>
</head>

<body style="background-color:#f5f5f5;">

  <!-- Navbar inyectado dinámicamente por main.js -->
  <div id="navbar-container"></div>

  <main class="py-5">
    <div class="container col-lg-10 col-xl-9">

      <!-- Encabezado -->
      <div class="mb-4">
        <h1 class="fw-bold mb-1">Carrito de Compras</h1>
        <p class="text-muted mb-0">Revisa que llevas todo lo que necesitas</p>
      </div>

      <div class="row g-4 align-items-start">

        <!-- ── Columna izquierda: lista de productos ───────────── -->
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom py-3">
              <h5 class="mb-0 fw-bold">Productos</h5>
            </div>
            <div class="card-body px-4 py-3">
              <!--
                BUG CORREGIDO: #cart-table-body estaba suelto FUERA del
                container Bootstrap — el layout se desbordaba por toda la pantalla.
                Ahora vive dentro del col-lg-8 correcto.
                checkout.js renderiza aquí sus filas Bootstrap.
              -->
              <div id="cart-table-body"></div>
            </div>
          </div>

          <!-- Seguir comprando -->
          <div class="mt-3">
            <!-- BUG CORREGIDO: ../../pages/public/products.html → ruta absoluta -->
            <a href="/pages/public/products.html" class="button-ixel-cafe text-center d-block">
              ← Continuar comprando
            </a>
          </div>
        </div>

        <!-- ── Columna derecha: resumen de compra (sticky) ─────── -->
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm position-sticky" style="top:2rem;">
            <div class="card-header bg-white border-bottom py-3">
              <h5 class="mb-0 fw-bold">Resumen de compra</h5>
            </div>
            <div class="card-body">
              <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between border-0 px-0">
                  <span class="text-muted">Subtotal</span>
                  <!-- checkout.js actualiza el <strong> dentro de este span -->
                  <span id="products-total">
                    <strong class="fs-5">$0.00</strong>
                  </span>
                </li>
                <li class="list-group-item d-flex justify-content-between border-0 px-0 text-success">
                  <span>Envío</span>
                  <span>Gratis</span>
                </li>
                <li class="list-group-item d-flex justify-content-between border-0 px-0 mb-2">
                  <strong>Total</strong>
                  <strong class="fs-4" id="products-total-final">$0.00</strong>
                </li>
              </ul>

              <button
                id="finalizar-compra"
                type="button"
                class="button-ixel-cafe w-100 btn-lg text-uppercase mt-2"
              >
                Finalizar Compra
              </button>
            </div>
          </div>
        </div>

      </div><!-- /row -->
    </div><!-- /container -->
  </main>

  <footer id="footer-container"></footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</body>

</html>
