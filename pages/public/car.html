<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Compra</title>
    <!--BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Estilos generales-->
    <link rel="stylesheet" href="../../assets/css/main.css">

    <!--JS FUNCIONALIDAD-->
    <script defer type="module" src="/assets/js/main.js"></script>
    <script defer src="../../assets/js/components/pages/cart.js"></script>
    
</head>

<body>
    <div id="navbar-container"></div>

    <main>
        <div>
            <h1>Carrito de Compras</h1>
            <p>Revisa que llevas todo lo que necesitas</p>
        </div>

        <section class="h-100" style="background-color: #f5f5f5;">
            <div class="container py-5">

                <div class="row d-flex justify-content-center my-4">

                    <div class="col-md-8">
                        <div class="card mb-4 border-0 shadow-sm">
                            <div class="card-header py-3 bg-white border-bottom-0">
                                <h5 class="mb-0 fw-bold">Carrito (2 productos)</h5>
                            </div>


                        </div>

                        <div class="card mb-4 border-0 shadow-sm">
                            <div class="card-body">
                                <p class="mb-0 fw-bold text-primary">Agregar más productos para envío full</p>
                            </div>

                        </div>
                        <div class="d-flex">
                            <a class="button-ixel-cafe text-center w-100" href="../../pages/public/products.html">Continuar comprando</a>
                        </div>
                    </div>


                    <div class="col-md-4">
                        <div class="card mb-4 border-0 shadow-sm position-sticky" style="top: 2rem;">
                            <div class="card-header py-3 bg-white border-bottom-0">
                                <h5 class="mb-0 fw-bold">Resumen de compra</h5>
                            </div>
                            <div class="card-body">
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 pb-0"
                                        id="products-info">

                                    </li>
                                    <li
                                        class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 text-success">
                                        Envío
                                        <span>Gratis</span>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 mb-3"
                                        id="products-total">
                                        <div>
                                            <strong>Total</strong>
                                        </div>
                                        <span><strong class="fs-4">$2,050.00</strong></span>
                                    </li>
                                </ul>

                                <button type="button" class="button-ixel-cafe w-100 btn-lg text-uppercase">
                                    Continuar compra
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>


        </section>



    </main>



    <footer id="footer-container"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>

</html>
