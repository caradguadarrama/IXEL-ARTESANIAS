<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contáctanos para crear piezas artesanales únicas de madera parota">
    <title>Contacto | IXEL Artesanías</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/pages/contact.css">

    <!-- JavaScript -->
    <script type="module" src="/assets/js/main.js"></script>
    <script type="module" src="/assets/js/components/pages/contact.js"></script>
</head>

<body>
    <!-- Navbar inyectado -->
    <div id="navbar-container"></div>

    <!-- Contenido principal -->
    <main class="contact-page">
        <!-- Hero con título -->
        <section class="contact-hero">
            <div class="contact-hero__container">
                <h1 class="contact-hero__title">Contacto</h1>
            </div>
        </section>

        <!-- Introducción -->
        <section class="contact-intro">
            <div class="contact-intro__container">
                <h2 class="contact-intro__title">
                    ¿Tienes algo en mente?<br>
                    Platícanos tu idea.
                </h2>
                <p class="contact-intro__text">
                    Si buscas colores en específico, algo en especial, dudas o sugerencias, escríbenos aquí:
                </p>
            </div>
        </section>

        <!-- Formulario de contacto -->
        <section class="contact-form-section">
            <form class="contact-form" id="contact-form" novalidate>
                <div class="contact-form__grid">
                    <!-- Columna izquierda -->
                    <div class="contact-form__column">
                        <!-- Nombre -->
                        <div class="contact-form__field">
                            <label for="name" class="contact-form__label">
                                Nombre <span class="contact-form__required">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="name" 
                                name="name"
                                class="contact-form__input" 
                                placeholder="Ingresa tu nombre"
                                required
                                aria-required="true"
                            >
                            <span class="contact-form__error" data-error="name"></span>
                        </div>

                        <!-- Teléfono -->
                        <div class="contact-form__field">
                            <label for="phone" class="contact-form__label">
                                Teléfono <span class="contact-form__required">*</span>
                            </label>
                            <input 
                                type="tel" 
                                id="phone" 
                                name="phone"
                                class="contact-form__input" 
                                placeholder="Ingresa tu número telefónico"
                                required
                                aria-required="true"
                            >
                            <span class="contact-form__error" data-error="phone"></span>
                        </div>

                        <!-- Email -->
                        <div class="contact-form__field">
                            <label for="email" class="contact-form__label">
                                Correo electrónico <span class="contact-form__required">*</span>
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email"
                                class="contact-form__input" 
                                placeholder="Ingresa tu correo electrónico"
                                required
                                aria-required="true"
                            >
                            <span class="contact-form__error" data-error="email"></span>
                        </div>
                    </div>

                    <!-- Columna derecha -->
                    <div class="contact-form__column">
                        <!-- Mensaje -->
                        <div class="contact-form__field contact-form__field--full">
                            <label for="message" class="contact-form__label">
                                Mensaje <span class="contact-form__required">*</span>
                            </label>
                            <textarea 
                                id="message" 
                                name="message"
                                class="contact-form__textarea" 
                                rows="8"
                                placeholder="Ingresa tu mensaje"
                                required
                                aria-required="true"
                            ></textarea>
                            <span class="contact-form__error" data-error="message"></span>
                        </div>

                        <!-- Botón de envío -->
                        <button type="submit" class="contact-form__submit">
                            Enviar
                        </button>
                    </div>
                </div>

                <!-- Mensaje de éxito -->
                <div class="contact-form__success" id="success-message" style="display: none;">
                    ✓ ¡Mensaje enviado exitosamente! Te contactaremos pronto.
                </div>
            </form>
        </section>

        <!-- Sección de ubicación -->
        <section class="contact-location">
            <div class="contact-location__container">
                <h2 class="contact-location__title">
                    Encuéntranos cada viernes<br>
                    9:00 AM - 1:00 PM
                </h2>

                <div class="contact-location__grid">
                    <!-- Imagen de la ubicación -->
                    <div class="contact-location__image-wrapper">
                        <p class="contact-location__text">
                            Encuéntranos cada viernes<br>
                            9:00 AM - 1:00 PM
                        </p>
                        <img 
                            src="/assets/img/contact/palmilla.png" 
                            alt="Mercado La Palmilla" 
                            class="contact-location__image"
                        >
                    </div>

                    <!-- Redes sociales -->

                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer inyectado -->
    <footer id="footer-container"></footer>
