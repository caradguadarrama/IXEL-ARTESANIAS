<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Compra - IXEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    
    <script defer type="module" src="/assets/js/main.js"></script>
    <script defer type="module" src="/assets/js/components/pages/checkout.js"></script>
</head>
<body>
    <div id="navbar-container"></div>

    <main class="py-5 bg-light">
        <div class="container">
            <h1 class="mb-4 fw-bold text-center">Resumen de tu Compra</h1>
            
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-cart3 me-2"></i>Productos en tu carrito</h5>
                        </div>
                        <div class="card-body p-0"> 
                            <div id="cart-table-body" class="px-4"></div>
                        </div>
                    </div>

                    <a href="/pages/public/products.html" class="btn btn-link text-decoration-none text-dark p-0">
                        <i class="bi bi-arrow-left"></i> Continuar comprando
                    </a>
                </div>

                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0 fw-bold">Resumen de pago</h5>
                        </div>
                        <div class="card-body">
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 pb-0" id="products-info">
                                    </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 text-success">
                                    Envío <span>Gratis</span>
                                </li>
                                <hr>
                                <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 mb-3" id="products-total">
                                    <div><strong>Total (IVA incluido)</strong></div>
                                    <span><strong class="fs-4 text-dark">$0.00</strong></span>
                                </li>
                            </ul>

                            <button id="finalizar-compra" type="button" class="button-ixel-cafe w-100 btn-lg text-uppercase shadow-sm">
                                Finalizar Compra
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-container"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
